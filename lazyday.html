<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A Lazy Day | Drawn For You</title>
  <style>
    body {
      background-color: #FAF9F5;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      color: #4A4A4A;
      margin: 0;
      padding: 40px 20px;
    }

    /* 中間那塊白色的質感展示卡片 */
    .project-container {
      max-width: 800px;
      margin: 0 auto;
      background-color: #FFFFFF;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
      text-align: center;
    }

    /* 畫作展示 */
    .project-image {
      max-width: 100%;
      border-radius: 12px;
      margin-bottom: 30px;
    }

    /* 標題與內文 */
    h1 {
      color: #5D5D5D;
      letter-spacing: 2px;
      margin-bottom: 20px;
    }

    .description {
      line-height: 2;
      color: #666;
      text-align: justify; /* 讓文字左右對齊，像雜誌排版 */
      margin-bottom: 40px;
    }

    /* 返回首頁的質感按鈕 */
    .back-btn {
      display: inline-block;
      padding: 12px 28px;
      background-color: #D4B895;
      color: white;
      text-decoration: none;
      border-radius: 25px;
      letter-spacing: 1px;
      transition: background-color 0.3s;
    }

    .back-btn:hover {
      background-color: #C1A37E;
    }
  </style>
</head>
<body>

  <div class="project-container">
    <img src="lazy.png" alt="A Lazy Day" class="project-image">
    
    <h1>A Lazy Day</h1>
    
    <div class="description">
      <p>Here is the story behind this illustration...</p>
      <p>這幅畫的靈感來自於一個悠閒的午後。沒有待辦事項、穿著最舒適的睡衣、手邊有一杯喜歡的飲料，享受著做自己喜歡的事情的完美時光。在線條與色彩上，我特別選用了溫暖的綠色調與帶有手帳感的網格背景，希望能傳遞出那種放鬆、平靜的日常溫度。</p>
    </div>

    <a href="index.html" class="back-btn">← Back to Gallery</a>
  </div>

</body>
</html>
